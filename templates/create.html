<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать комнату</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-switch" onclick="toggleTheme()">🌓 Тема</div>
    <div class="container">
        <div class="card">
            <h2>Создание комнаты</h2>
            <form method="post">
                <input type="text" name="player_name" placeholder="Ваше имя" required>
                <button type="submit" class="btn">Создать</button>
            </form>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script>
        // --- код темы и тостов (как в index.html) ---
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);
        else setTheme('light');
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    showToast("{{ message }}", "{{ category }}");
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
