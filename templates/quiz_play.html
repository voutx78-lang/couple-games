<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ответить на вопросы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-switch" onclick="toggleTheme()">🌓 Тема</div>
    <div class="container">
        <div class="card">
            <h2>Ответьте на вопросы</h2>
            <form method="post">
                {% for q in questions %}
                    <div class="form-group">
                        <label>{{ q[1] }}</label>
                        <input type="text" name="answer_{{ q[0] }}" value="{{ saved_answers.get(q[0]|string, '') }}" placeholder="Ваш ответ">
                    </div>
                {% endfor %}
                <button type="submit" class="btn">Отправить ответы</button>
            </form>
            <p><a href="/lobby">Вернуться в лобби</a></p>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script>
        // стандартный код темы и тостов
    </script>
</body>
</html>
