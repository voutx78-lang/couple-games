<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квест – Исследователь</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-switch" onclick="toggleTheme()">🌓 Тема</div>
    <div class="container">
        <div class="card">
            <h2>Этап {{ step }}</h2>
            <p>{{ prompt }}</p>
            <form method="post">
                <input type="text" name="answer" placeholder="Ваш ответ" required>
                <button type="submit" class="btn">Ответить</button>
            </form>
            <p><a href="/lobby">Вернуться в лобби</a></p>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script>
        // стандартный код
    </script>
</body>
</html>
