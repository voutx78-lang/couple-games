<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание вопросов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-switch" onclick="toggleTheme()">🌓 Тема</div>
    <div class="container">
        <div class="card">
            <h2>Создайте вопросы для партнёра</h2>
            <form method="post" id="quiz-form">
                <div id="questions-container">
                    <div class="question-group">
                        <input type="text" name="question_0" placeholder="Вопрос" required>
                        <input type="text" name="answer_0" placeholder="Правильный ответ" required>
                    </div>
                </div>
                <button type="button" onclick="addQuestion()" class="btn btn-outline">+ Добавить вопрос</button>
                <button type="submit" class="btn">Сохранить</button>
            </form>
            <p><a href="/lobby">Вернуться в лобби</a></p>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script>
        let qCount = 1;
        function addQuestion() {
            const container = document.getElementById('questions-container');
            const div = document.createElement('div');
            div.className = 'question-group';
            div.innerHTML = `
                <input type="text" name="question_${qCount}" placeholder="Вопрос" required>
                <input type="text" name="answer_${qCount}" placeholder="Правильный ответ" required>
            `;
            container.appendChild(div);
            qCount++;
        }
        // стандартный код темы и тостов
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);
        else setTheme('light');
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    showToast("{{ message }}", "{{ category }}");
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
